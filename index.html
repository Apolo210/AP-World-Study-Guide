let etTimer=null, etSecondsLeft=0, etTotalSeconds=0, etRunning=false, etLabel="Exam Timer";
function etSetPreset(minutes, label){
  etReset();
  etLabel=label;
  etTotalSeconds=minutes*60;
  etSecondsLeft=minutes*60;
  const lbl=document.getElementById("essay-timer-lbl");
  if(lbl)lbl.textContent=label;
  etUpdateDisplay();
}
function etSetCustom(){
  const inp=document.getElementById("et-custom-min");
  if(!inp)return;
  const mins=parseInt(inp.value)||45;
  const clamped=Math.max(1,Math.min(180,mins));
  etSetPreset(clamped, `Custom (${clamped} min)`);
}
function etToggle(){
  if(!etTotalSeconds){etSetPreset(45,"Custom (45 min)");} // default if nothing set
  const btn=document.getElementById("et-start-btn");
  if(etRunning){
    clearInterval(etTimer);etTimer=null;etRunning=false;
    if(btn)btn.textContent="▶ Resume";
  } else {
    etRunning=true;
    if(btn)btn.textContent="⏸ Pause";
    etTimer=setInterval(()=>{
      etSecondsLeft--;
      etUpdateDisplay();
      if(etSecondsLeft<=0){
        clearInterval(etTimer);etTimer=null;etRunning=false;
        const btn2=document.getElementById("et-start-btn");
        if(btn2)btn2.textContent="▶ Start";
        const disp=document.getElementById("essay-timer-disp");
        if(disp){disp.textContent="00:00";disp.className="essay-timer-display urgent";}
        setTimeout(()=>alert("⏰ Time is up! Finish your thought and stop writing."),100);
      }
    },1000);
  }
}
function etReset(){
  clearInterval(etTimer);etTimer=null;etRunning=false;
  etSecondsLeft=etTotalSeconds;
  const btn=document.getElementById("et-start-btn");
  if(btn)btn.textContent="▶ Start";
  etUpdateDisplay();
}
function etFmt(s){
  const m=Math.floor(s/60), sec=s%60;
  return String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");
}
function etUpdateDisplay(){
  const disp=document.getElementById("essay-timer-disp");
  const fill=document.getElementById("essay-timer-fill");
  if(!disp)return;
  if(!etTotalSeconds){
    disp.textContent="--:--";
    disp.className="essay-timer-display";
    if(fill)fill.style.width="100%";
    return;
  }
  disp.textContent=etFmt(etSecondsLeft);
  const pct=(etSecondsLeft/etTotalSeconds)*100;
  // Color based on time remaining
  const cls=pct<=10?"urgent":pct<=25?"warning":"";
  disp.className="essay-timer-display"+(cls?" "+cls:"");
  if(fill){
    fill.style.width=pct+"%";
    fill.className="essay-timer-prog-fill"+(cls?" "+cls:"");
  }
}

async function essayGrade(type){

  const prompt=`You are an expert AP History essay grader. A student has written a ${t.name} outline.

ESSAY TYPE: ${t.name} — ${t.desc}

OFFICIAL RUBRIC (${t.rubric.length} points total):
${rubricText}

${sectionsText}

Respond with EXACTLY this format:

SCORE: X/${t.rubric.length}

RUBRIC BREAKDOWN:
${t.rubric.map((r,i)=>`${i+1}. [MET/PARTIAL/MISSING] — one sentence of specific feedback`).join("\n")}

TOP PRIORITY IMPROVEMENT:
One concrete actionable suggestion.

STRENGTH:
One genuine specific thing they did well.`;

  // ── PROXY URL — replace with your Vercel deployment URL ──
  const PROXY_URL="https://YOUR-PROJECT.vercel.app/api/grade";

  try{
    const resp=await fetch(PROXY_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt})
    });
    if(!resp.ok){
      const e=await resp.json().catch(()=>({}));
      throw new Error(e.error||`HTTP ${resp.status}`);

    function parseSection(txt,header){

          <div style="font-size:.83rem;color:var(--muted);line-height:1.6">${strength}</div>
        </div>`:""}
      </div>
    </div>`;
  }catch(err){
    out.innerHTML=`<div style="background:rgba(124,58,58,.15);border:1px solid rgba(124,58,58,.3);border-radius:var(--r);padding:1.1rem 1.3rem">
      <div style="font-size:.85rem;font-weight:500;color:var(--text);margin-bottom:.4rem">Grader not connected</div>

    </div>`;
  }

    solve:{PE:(v)=>v.m*v.g*v.h, m:(v)=>v.PE/(v.g*v.h), g:(v)=>v.PE/(v.m*v.h), h:(v)=>v.PE/(v.m*v.g)}},
  {name:"Kinetic Energy",eq:"KE = ½mv²",subj:"Physics",vars:[
    {sym:"KE",desc:"Kinetic energy (J)",unit:"J"},
    {sym:"m",desc:"Mass (kg)",unit:"kg"},
    {sym:"v",desc:"Velocity (m/s)",unit:"m/s"}],
    solve:{KE:(v)=>0.5*v.m*v.v*v.v, m:(v)=>2*v.KE/(v.v*v.v), v:(v)=>Math.sqrt(2*v.KE/v.m)}},
  {name:"Ohm's Law",eq:"V = IR",subj:"Physics",vars:[
    {sym:"V",desc:"Voltage (Volts)",unit:"V"},
    {sym:"I",desc:"Current (Amps)",unit:"A"},
    {sym:"R",desc:"Resistance (Ohms)",unit:"Ω"}],
    solve:{V:(v)=>v.I*v.R, I:(v)=>v.V/v.R, R:(v)=>v.V/v.I}},
  {name:"Wave Speed",eq:"v = fλ",subj:"Physics",vars:[
    {sym:"v",desc:"Wave speed (m/s)",unit:"m/s"},
    {sym:"f",desc:"Frequency (Hz)",unit:"Hz"},
    {sym:"λ",desc:"Wavelength (m)",unit:"m"}],
    solve:{v:(vv)=>vv.f*vv.λ, f:(vv)=>vv.v/vv.λ, λ:(vv)=>vv.v/vv.f}},
  {name:"Area of a Circle",eq:"A = πr²",subj:"Math",vars:[
    {sym:"A",desc:"Area",unit:""},
    {sym:"r",desc:"Radius",unit:""}],
    solve:{A:(v)=>Math.PI*v.r*v.r, r:(v)=>Math.sqrt(v.A/Math.PI)}},
  {name:"Pythagorean Theorem",eq:"c² = a² + b²",subj:"Math",vars:[
    {sym:"c",desc:"Hypotenuse",unit:""},
    {sym:"a",desc:"Leg a",unit:""},
    {sym:"b",desc:"Leg b",unit:""}],
    solve:{c:(v)=>Math.sqrt(v.a*v.a+v.b*v.b), a:(v)=>Math.sqrt(v.c*v.c-v.b*v.b), b:(v)=>Math.sqrt(v.c*v.c-v.a*v.a)}},
  {name:"Slope-Intercept Line",eq:"y = mx + b",subj:"Math",vars:[
    {sym:"y",desc:"y value",unit:""},
    {sym:"m",desc:"Slope",unit:""},
    {sym:"x",desc:"x value",unit:""},
    {sym:"b",desc:"y-intercept",unit:""}],
    solve:{y:(v)=>v.m*v.x+v.b, m:(v)=>(v.y-v.b)/v.x, x:(v)=>(v.y-v.b)/v.m, b:(v)=>v.y-v.m*v.x}},
  {name:"Molarity",eq:"M = n / V",subj:"Chemistry",vars:[
    {sym:"M",desc:"Molarity (mol/L)",unit:"mol/L"},

    {sym:"pH",desc:"pH value",unit:""},

function renderFormulaCalc(body){
  const grouped={Physics:[],Math:[],Chemistry:[]};
  FC_FORMULAS.forEach(f=>{if(grouped[f.subj])grouped[f.subj].push(f);});
  body.innerHTML=`
    <p class="section-sub">Pick a formula, enter the values you know, and the calculator solves for the unknown.</p>
    ${Object.entries(grouped).map(([subj,fmls])=>`
      <div class="tool-section-hd">${subj}</div>
      <div class="formula-picker" style="margin-bottom:1.2rem">
        ${fmls.map((f,i)=>`<button class="formula-tile${fcSelected===FC_FORMULAS.indexOf(f)?" active":""}" onclick="fcSelect(${FC_FORMULAS.indexOf(f)})">
          <span class="ft-eq">${f.eq}</span>
          <span class="ft-nm">${f.name}</span>
        </button>`).join("")}
      </div>`).join("")}
    <div id="fc-calc-area"></div>`;
  if(fcSelected!==null)fcRender();
}
function fcSelect(idx){
  fcSelected=idx;
  document.querySelectorAll(".formula-tile").forEach((t,i)=>t.classList.toggle("active",i===idx));
  fcRender();
}
function fcRender(){
  const area=document.getElementById("fc-calc-area");if(!area)return;
  const f=FC_FORMULAS[fcSelected];if(!f)return;
  area.innerHTML=`
    <div class="tool-section-hd">${f.name} — ${f.eq}</div>
    <p style="font-size:.78rem;color:var(--muted);margin-bottom:.8rem">Leave ONE field blank — that's what will be solved for. Fill in all the others.</p>
    <div class="calc-inputs" id="fc-inputs">
      ${f.vars.map(v=>`<div class="calc-var-row">
        <div class="calc-var-lbl">${v.sym}</div>
        <div class="calc-var-desc">${v.desc}</div>
        <input class="calc-var-inp" id="fc_${v.sym}" type="number" placeholder="?" step="any">
      </div>`).join("")}
    </div>
    <div class="calc-solve-btn-row">
      <button class="btn-primary" onclick="fcSolve()">Calculate</button>
      <button class="btn-ghost" onclick="fcClear()">Clear</button>
    </div>
    <div id="fc-result" style="margin-top:.8rem"></div>`;
}
function fcSolve(){
  const f=FC_FORMULAS[fcSelected];if(!f)return;
  const vals={};let missing=null,missingCount=0;
  f.vars.forEach(v=>{
    const inp=document.getElementById("fc_"+v.sym);
    if(!inp||inp.value===""){missingCount++;missing=v.sym;}
    else vals[v.sym]=parseFloat(inp.value);
  });
  const res=document.getElementById("fc-result");
  if(missingCount===0){res.innerHTML=`<div style="color:var(--wrong);font-size:.85rem">Leave exactly ONE field blank — the one you want to solve for.</div>`;return;}
  if(missingCount>1){res.innerHTML=`<div style="color:var(--wrong);font-size:.85rem">Please leave only ONE field blank.</div>`;return;}
  const solver=f.solve[missing];
  if(!solver){res.innerHTML=`<div style="color:var(--wrong);font-size:.85rem">Cannot algebraically solve for ${missing} with this formula.</div>`;return;}
  try{
    const answer=solver(vals);
    if(isNaN(answer)||!isFinite(answer)){res.innerHTML=`<div style="color:var(--wrong);font-size:.85rem">Check your values — result is not a real number.</div>`;return;}
    const unit=f.vars.find(v=>v.sym===missing)?.unit||"";
    res.innerHTML=`<div class="calc-result"><div class="calc-result-val">${missing} = ${parseFloat(answer.toPrecision(6))} ${unit}</div><div class="calc-result-lbl">${f.name}</div></div>`;
    document.getElementById("fc_"+missing).value=parseFloat(answer.toPrecision(6));
  }catch(e){res.innerHTML=`<div style="color:var(--wrong);font-size:.85rem">Could not calculate — check your values.</div>`;}
}
function fcClear(){
  const f=FC_FORMULAS[fcSelected];if(!f)return;
  f.vars.forEach(v=>{const inp=document.getElementById("fc_"+v.sym);if(inp)inp.value="";});
  document.getElementById("fc-result").innerHTML="";
}

// ── Pomodoro widget drag ──
(function(){
  const widget=document.getElementById("pom-widget");
  const handle=document.getElementById("pom-drag-handle");
  if(!widget||!handle)return;
  let dragging=false,ox=0,oy=0,wx=0,wy=0;
  function startDrag(e){
    dragging=true;
    const src=e.touches?e.touches[0]:e;
    const rect=widget.getBoundingClientRect();
    ox=src.clientX-rect.left; oy=src.clientY-rect.top;
    wx=rect.left; wy=rect.top;
    // Switch from bottom/right anchoring to top/left
    widget.style.bottom="auto"; widget.style.right="auto";
    widget.style.left=wx+"px"; widget.style.top=wy+"px";
    e.preventDefault();
  }
  function doDrag(e){
    if(!dragging)return;
    const src=e.touches?e.touches[0]:e;
    const x=Math.max(0,Math.min(src.clientX-ox, window.innerWidth-widget.offsetWidth));
    const y=Math.max(0,Math.min(src.clientY-oy, window.innerHeight-widget.offsetHeight));
    widget.style.left=x+"px"; widget.style.top=y+"px";
  }
  function stopDrag(){dragging=false;}
  handle.addEventListener("mousedown",startDrag);
  document.addEventListener("mousemove",doDrag);
  document.addEventListener("mouseup",stopDrag);
  handle.addEventListener("touchstart",startDrag,{passive:false});
  document.addEventListener("touchmove",doDrag,{passive:false});
  document.addEventListener("touchend",stopDrag);
})();
