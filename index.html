<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e10;--surface:#17171a;--surface2:#1f1f24;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#f0efe8;--muted:#8a8982;--accent:#d4a853;--accent2:rgba(212,168,83,0.13);--correct-bg:#1a2e22;--correct:#3a7c5a;--wrong-bg:#2e1a1a;--wrong:#7c3a3a;--r:14px;--r-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#home{display:block}
.home-wrap{max-width:920px;margin:0 auto;padding:3.5rem 1.5rem 5rem}
.home-eyebrow{font-size:.7rem;text-transform:uppercase;letter-spacing:.14em;color:var(--accent);margin-bottom:.7rem}
.home-h1{font-family:"DM Serif Display",serif;font-size:2.8rem;font-weight:400;letter-spacing:-.03em;line-height:1.1;margin-bottom:.6rem}
.home-sub{font-size:.9rem;color:var(--muted);margin-bottom:3.2rem;max-width:500px;line-height:1.6}
.subject-label{font-size:.67rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:.9rem;display:flex;align-items:center;gap:8px}
.subject-label::after{content:"";flex:1;height:1px;background:var(--border)}
.class-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;margin-bottom:3rem}
.class-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.3rem 1.4rem;cursor:pointer;transition:border-color .2s;position:relative;overflow:hidden;text-align:left;width:100%;font-family:"DM Sans",sans-serif;color:var(--text)}
.class-card *{pointer-events:none}
.class-card::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,var(--accent2) 0%,transparent 60%);opacity:0;transition:opacity .25s}
.class-card:hover{border-color:rgba(212,168,83,.35)}.class-card:hover::before{opacity:1}
.cc-icon{font-size:1.5rem;margin-bottom:.7rem;display:block}.cc-name{font-size:.95rem;font-weight:500;color:var(--text);margin-bottom:.2rem}
.cc-desc{font-size:.73rem;color:var(--muted);line-height:1.5}
.cc-tag{display:inline-block;margin-top:.6rem;font-size:.62rem;border-radius:100px;padding:2px 8px;border:1px solid rgba(212,168,83,.3);color:var(--accent);letter-spacing:.04em}
/* App shell */
#app{display:none;flex-direction:column;min-height:100vh}
.app-header{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem;background:var(--bg);position:sticky;top:0;z-index:10}
.back-btn{padding:5px 13px;border-radius:var(--r-sm);border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:"DM Sans",sans-serif;font-size:.76rem;cursor:pointer;transition:all .18s;flex-shrink:0}
.back-btn:hover{color:var(--text);border-color:var(--accent)}
.app-title{font-family:"DM Serif Display",serif;font-size:1.25rem;font-weight:400;flex:1}
.app-sub{font-size:.72rem;color:var(--muted)}
.app-nav{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;background:var(--bg);position:sticky;top:52px;z-index:9}
.app-nav::-webkit-scrollbar{display:none}
.nav-tab{padding:10px 15px;border:none;background:transparent;color:var(--muted);font-family:"DM Sans",sans-serif;font-size:.78rem;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .18s;flex-shrink:0}
.nav-tab:hover{color:var(--text)}.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.page{display:none;max-width:800px;margin:0 auto;padding:1.8rem 1.5rem 4rem}.page.active{display:block}
/* Shared */
.unit-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:1rem}
.unit-lbl{font-size:.71rem;color:var(--muted);flex-shrink:0;margin-right:2px}
.unit-btn{padding:3px 10px;border-radius:100px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:"DM Sans",sans-serif;font-size:.73rem;cursor:pointer;transition:all .17s;white-space:nowrap}
.unit-btn:hover{border-color:var(--accent);color:var(--text)}.unit-btn.active{background:var(--accent);color:#0e0e10;border-color:var(--accent);font-weight:500}
.count-lbl{font-size:.72rem;color:var(--muted);font-style:italic;margin-bottom:1.2rem}
.section-hd{font-family:"DM Serif Display",serif;font-size:1.05rem;font-weight:400;color:var(--text);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.section-sub{font-size:.8rem;color:var(--muted);margin-bottom:1.4rem;line-height:1.6}
.badge-accent{color:var(--accent);border:1px solid rgba(212,168,83,.3);font-size:.67rem;border-radius:100px;padding:2px 9px;display:inline-block}
.btn-primary{padding:9px 24px;border-radius:var(--r-sm);border:none;background:var(--accent);color:#0e0e10;font-family:"DM Sans",sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;transition:opacity .2s;margin-right:8px;margin-top:6px}
.btn-primary:hover{opacity:.85}
.btn-ghost{padding:9px 20px;border-radius:var(--r-sm);border:1px solid var(--border2);background:transparent;color:var(--text);font-family:"DM Sans",sans-serif;font-size:.88rem;cursor:pointer;transition:all .2s;margin-top:6px}
.btn-ghost:hover{background:var(--surface2)}
.empty{text-align:center;padding:3rem;color:var(--muted);font-size:.88rem}
.prog-bar-wrap{height:2px;background:var(--border);border-radius:1px;margin-bottom:1.4rem;overflow:hidden}
.prog-bar{height:100%;background:var(--accent);border-radius:1px;transition:width .3s}
.icon-btn{font-family:"DM Sans",sans-serif;font-size:.76rem;color:var(--muted);background:transparent;border:1px solid var(--border);border-radius:var(--r-sm);padding:5px 11px;cursor:pointer;transition:all .17s}
.icon-btn:hover{color:var(--text);border-color:var(--border2)}
/* Score screen */
.score-screen{text-align:center;padding:2rem 1rem}
.score-num{font-family:"DM Serif Display",serif;font-size:4.5rem;color:var(--accent);line-height:1}
.score-sub{font-size:.83rem;color:var(--muted);margin-top:.3rem;margin-bottom:1.8rem}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.8rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:1rem}
.stat-n{font-size:1.7rem;font-family:"DM Serif Display",serif}.stat-l{font-size:.73rem;color:var(--muted);margin-top:2px}
/* Quiz */
.quiz-meta{font-size:.73rem;color:var(--muted);margin-bottom:.8rem}
.quiz-q{font-size:.95rem;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem 1.4rem;margin-bottom:.9rem;line-height:1.6}
.quiz-q em{font-family:"DM Serif Display",serif;font-style:italic;color:var(--accent);font-size:1.05rem}
.choice{display:block;width:100%;text-align:left;padding:10px 14px;margin-bottom:7px;border-radius:var(--r-sm);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:"DM Sans",sans-serif;font-size:.86rem;cursor:pointer;transition:all .2s;line-height:1.45}
.choice:hover:not([disabled]){background:var(--surface2);border-color:rgba(255,255,255,.2)}
.choice.correct{background:var(--correct-bg);border-color:var(--correct);color:#a3e0c0}
.choice.wrong{background:var(--wrong-bg);border-color:var(--wrong);color:#e0a3a3}
.explain-box{font-size:.78rem;padding:10px 14px;border-radius:var(--r-sm);background:var(--surface2);color:var(--muted);line-height:1.55;border-left:2px solid var(--accent);margin-top:4px;display:none}
/* Flashcards */
.card-scene{perspective:1000px;height:220px;cursor:pointer;margin-bottom:1rem;user-select:none}
.card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1)}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;border-radius:var(--r);border:1px solid var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem 2rem;text-align:center;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.card-front{background:#1a1a1f}.card-back{background:#1e1c16;transform:rotateY(180deg)}
.card-lbl{font-size:.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.4rem}
.card-term{font-family:"DM Serif Display",serif;font-size:1.45rem;color:var(--text);line-height:1.2}
.card-term.fm{font-family:monospace;font-size:.98rem;color:var(--accent);background:var(--surface2);padding:7px 13px;border-radius:var(--r-sm);border:1px solid var(--border2)}
.card-def{font-size:.84rem;color:var(--text);line-height:1.6;max-width:90%;font-weight:300}.card-hint{font-size:.63rem;color:var(--muted);margin-top:.7rem}
.flash-nav{display:flex;align-items:center;gap:8px;margin-bottom:.8rem;flex-wrap:wrap}
.nav-btn{padding:6px 16px;border-radius:var(--r-sm);border:1px solid var(--border2);background:transparent;color:var(--text);font-family:"DM Sans",sans-serif;font-size:.8rem;cursor:pointer;transition:all .17s}
.nav-btn:hover{background:var(--surface2)}.flash-prog{flex:1;text-align:center;font-size:.78rem;color:var(--muted)}
/* Timeline */
.timeline{position:relative;padding-left:26px}
.timeline::before{content:"";position:absolute;left:6px;top:0;bottom:0;width:1px;background:var(--border2)}
.tl-item{position:relative;margin-bottom:1.4rem}
.tl-dot{position:absolute;left:-22px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}
.tl-year{font-size:.7rem;color:var(--accent);font-weight:500;letter-spacing:.04em;margin-bottom:2px}
.tl-title{font-size:.93rem;font-weight:500;color:var(--text);margin-bottom:2px}
.tl-desc{font-size:.81rem;color:var(--muted);line-height:1.55;font-weight:300}
.tl-unit{font-size:.66rem;color:var(--muted);margin-top:4px;border:1px solid var(--border);border-radius:100px;padding:2px 7px;display:inline-block}
/* People */
.people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.person-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem;cursor:pointer;transition:border-color .2s}
.person-card:hover{border-color:var(--border2)}.person-card.open .person-body{display:block}
.person-header{display:flex;align-items:flex-start;gap:10px}
.person-init{width:38px;height:38px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center;font-family:"DM Serif Display",serif;font-size:.95rem;color:var(--accent);flex-shrink:0}
.person-name{font-size:.93rem;font-weight:500;color:var(--text)}.person-sub{font-size:.75rem;color:var(--muted);margin-top:1px}
.person-body{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:.81rem;color:var(--muted);line-height:1.6;font-weight:300}
/* Comparisons */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.2rem}
.compare-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem}
.compare-title{font-size:.85rem;font-weight:500;color:var(--accent);margin-bottom:.6rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.compare-row{font-size:.8rem;color:var(--muted);margin-bottom:.4rem;line-height:1.45}.compare-row strong{color:var(--text);font-weight:500}
/* Themes */
.theme-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem;margin-bottom:10px;cursor:pointer}
.theme-card.open .theme-body{display:block}
.theme-header{display:flex;align-items:center;justify-content:space-between}
.theme-title{font-size:.95rem;font-weight:500;color:var(--text)}.theme-arrow{color:var(--muted);font-size:.8rem;transition:transform .2s}
.theme-card.open .theme-arrow{transform:rotate(90deg)}
.theme-body{display:none;margin-top:.9rem;padding-top:.9rem;border-top:1px solid var(--border)}
.theme-example{font-size:.79rem;background:var(--surface2);border-radius:var(--r-sm);padding:8px 12px;margin-bottom:6px;color:var(--muted);line-height:1.45}
.theme-example strong{color:var(--text);font-weight:500}
/* Writing / tip cards */
.writing-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.3rem;margin-bottom:10px}
.writing-type{font-size:.67rem;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:.4rem}
.writing-title{font-size:.95rem;font-weight:500;color:var(--text);margin-bottom:.6rem}
.writing-desc{font-size:.82rem;color:var(--muted);line-height:1.6;margin-bottom:.8rem}
.writing-steps{list-style:none;padding:0}
.writing-steps li{font-size:.8rem;color:var(--muted);padding:5px 0 5px 18px;border-bottom:1px solid var(--border);line-height:1.45;position:relative}
.writing-steps li:last-child{border-bottom:none}.writing-steps li::before{content:"→";position:absolute;left:0;color:var(--accent)}
.writing-steps li strong{color:var(--text);font-weight:500}
.score-rubric{display:grid;grid-template-columns:auto 1fr;gap:6px 12px;margin-top:.8rem}
.rubric-pts{font-size:.8rem;font-weight:500;color:var(--accent);white-space:nowrap}.rubric-desc{font-size:.79rem;color:var(--muted);line-height:1.4}
.tip-card{background:var(--surface);border-left:3px solid var(--accent);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:1rem 1.2rem;margin-bottom:10px}
.tip-label{font-size:.67rem;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:.3rem}
.tip-text{font-size:.83rem;color:var(--muted);line-height:1.6}.tip-text strong{color:var(--text);font-weight:500}
.exam-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.4rem}
.exam-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:1rem;text-align:center}
.exam-stat-n{font-family:"DM Serif Display",serif;font-size:1.8rem;color:var(--accent)}.exam-stat-l{font-size:.75rem;color:var(--muted);margin-top:2px}
/* Formulas */
.formula-group{margin-bottom:1.8rem}.formula-group-title{font-size:.67rem;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:.8rem}
.formula-row{display:grid;grid-template-columns:1.2fr 1.4fr;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:.83rem}
.formula-row:last-child{border-bottom:none}
.formula-name{color:var(--muted);font-size:.79rem}.formula-expr{font-family:monospace;color:var(--accent);font-size:.86rem;word-break:break-all}
.formula-note{font-size:.73rem;color:var(--muted);margin-top:2px}
/* Concepts */
.concept-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.concept-header{padding:1rem 1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.concept-title{font-size:.92rem;font-weight:500;color:var(--text)}.concept-arrow{color:var(--muted);font-size:.75rem;transition:transform .2s;flex-shrink:0}
.concept-card.open .concept-arrow{transform:rotate(90deg)}
.concept-body{display:none;padding:0 1.3rem 1.1rem;border-top:1px solid var(--border)}
.concept-card.open .concept-body{display:block}
.concept-body p{font-size:.82rem;color:var(--muted);line-height:1.7;margin-top:.8rem}.concept-body p strong{color:var(--text)}
.concept-body .example{background:var(--surface2);border-radius:var(--r-sm);padding:10px 13px;margin-top:8px;font-size:.8rem;color:var(--muted);line-height:1.65;border-left:2px solid var(--accent)}
.concept-body .example .math{font-family:monospace;color:var(--accent)}
/* Practice */
.problem-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.3rem;margin-bottom:10px}
.problem-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:.8rem}
.problem-num{font-size:.64rem;text-transform:uppercase;letter-spacing:.1em;color:var(--accent)}
.problem-diff{font-size:.65rem;border-radius:100px;padding:2px 9px;border:1px solid var(--border2);color:var(--muted);flex-shrink:0}
.problem-diff.easy{border-color:rgba(58,124,90,.4);color:#5aaf82}.problem-diff.medium{border-color:rgba(212,168,83,.4);color:var(--accent)}.problem-diff.hard{border-color:rgba(180,80,80,.4);color:#c07070}
.problem-q{font-size:.92rem;color:var(--text);line-height:1.65;margin-bottom:.9rem}
.mth{font-family:monospace;font-size:.93rem;color:var(--accent);background:var(--surface2);padding:1px 6px;border-radius:4px}
.answer-area{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.answer-input{flex:1;min-width:120px;padding:8px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-family:monospace;font-size:.88rem;outline:none;transition:border-color .17s}
.answer-input:focus{border-color:var(--accent)}
.check-btn{padding:8px 18px;border-radius:var(--r-sm);border:none;background:var(--accent);color:#0e0e10;font-family:"DM Sans",sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:opacity .17s;white-space:nowrap}.check-btn:hover{opacity:.85}
.show-btn{padding:8px 14px;border-radius:var(--r-sm);border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:"DM Sans",sans-serif;font-size:.82rem;cursor:pointer;transition:all .17s;white-space:nowrap}.show-btn:hover{color:var(--text)}
.solution-box{margin-top:10px;padding:12px 14px;background:var(--surface2);border-radius:var(--r-sm);border-left:2px solid var(--accent);display:none;font-size:.81rem;color:var(--muted);line-height:1.65}
.solution-box.visible{display:block}.solution-box strong{color:var(--text)}
.step{margin:3px 0;padding-left:14px;position:relative}.step::before{content:"→";position:absolute;left:0;color:var(--accent);font-size:.78rem}
.result-tag{font-size:.79rem;margin-top:6px;display:none}.result-ok{color:#5aaf82}.result-bad{color:#c07070}
/* Periodic table */
.ptable-wrap{overflow-x:auto;margin-bottom:1.2rem}
.ptable{display:grid;grid-template-columns:repeat(18,minmax(38px,1fr));gap:2px;min-width:700px}
.el{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:4px 3px;text-align:center;cursor:pointer;transition:all .17s;position:relative}
.el:hover{border-color:var(--accent);background:var(--surface2);z-index:2}
.el.highlight{border-color:var(--accent);background:rgba(212,168,83,.15)}
.el-num{font-size:.55rem;color:var(--muted);display:block}
.el-sym{font-size:.88rem;font-weight:500;color:var(--text);display:block}
.el-name{font-size:.48rem;color:var(--muted);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.el.alkali{background:#1e1a14;border-color:rgba(212,168,83,.25)}
.el.alkaline{background:#14181e;border-color:rgba(90,141,217,.2)}
.el.transition{background:#1a1a1e;border-color:rgba(180,180,180,.15)}
.el.nonmetal{background:#141e14;border-color:rgba(90,217,90,.2)}
.el.halogen{background:#1e1418;border-color:rgba(217,90,141,.2)}
.el.noble{background:#181e18;border-color:rgba(90,217,160,.2)}
.el.metalloid{background:#1a181a;border-color:rgba(160,90,217,.2)}
.el.metal{background:#1a1814;border-color:rgba(200,160,90,.2)}
.el-detail{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:1.2rem;margin-top:10px;display:none}
.el-detail.visible{display:block}
.el-detail-sym{font-family:"DM Serif Display",serif;font-size:3rem;color:var(--accent)}
.el-detail-name{font-size:1rem;font-weight:500;color:var(--text);margin-bottom:.3rem}
.el-detail-info{font-size:.81rem;color:var(--muted);line-height:1.65}
/* Grapher */
.graph-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem;margin-bottom:1rem}
.graph-canvas{width:100%;border-radius:var(--r-sm);display:block}
.graph-controls{display:flex;gap:7px;flex-wrap:wrap;margin-top:.8rem;align-items:center}
.graph-input{flex:1;min-width:160px;padding:7px 11px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-family:monospace;font-size:.84rem;outline:none;transition:border-color .17s}.graph-input:focus{border-color:var(--accent)}
.graph-btn{padding:7px 16px;border-radius:var(--r-sm);border:none;background:var(--accent);color:#0e0e10;font-family:"DM Sans",sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;white-space:nowrap}
.graph-info{font-size:.73rem;color:var(--muted);margin-top:.5rem}
.fn-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}

/* ── Two-level home ── */

.subj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem 1.8rem;cursor:pointer;transition:all .22s;position:relative;overflow:hidden;text-align:left;width:100%;font-family:"DM Sans",sans-serif;color:var(--text)}
.subj-card::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,var(--accent2) 0%,transparent 55%);opacity:0;transition:opacity .25s;pointer-events:none}
.subj-card:hover{border-color:rgba(212,168,83,.45);transform:translateY(-2px)}.subj-card:hover::before{opacity:1}

.conj-table{width:100%;border-collapse:collapse;margin-bottom:1.2rem;font-size:.83rem}

.conj-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:1rem;overflow:hidden}

.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.vocab-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:.9rem 1.1rem;display:flex;justify-content:space-between;align-items:center;gap:1rem}

.sp-quiz-q{font-size:1.1rem;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem 1.6rem;margin-bottom:1rem;line-height:1.6;text-align:center}
.sp-quiz-input{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-family:"DM Sans",sans-serif;font-size:.95rem;outline:none;margin-bottom:.7rem;transition:border-color .17s}
.sp-quiz-input:focus{border-color:var(--accent)}

/* ── Tools panel ── */
#tools-panel{display:none;position:fixed;inset:0;z-index:100;background:var(--bg);overflow-y:auto}
.tools-header{padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem;position:sticky;top:0;background:var(--bg);z-index:10}

.tool-section-hd{font-family:"DM Serif Display",serif;font-size:1.05rem;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);color:var(--text)}

/* Home tools grid */
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:2rem}
.tool-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem 1rem;cursor:pointer;transition:all .2s;text-align:left;width:100%;font-family:"DM Sans",sans-serif;color:var(--text);position:relative;overflow:hidden}
.tool-card::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,var(--accent2) 0%,transparent 60%);opacity:0;transition:opacity .25s;pointer-events:none}
.tool-card:hover{border-color:rgba(212,168,83,.4);transform:translateY(-2px)}.tool-card:hover::before{opacity:1}
.tool-card *{pointer-events:none}
.tool-icon{font-size:1.6rem;margin-bottom:.6rem;display:block}
.tool-name{font-size:.88rem;font-weight:500;color:var(--text);margin-bottom:.15rem}

.pom-ring{width:200px;height:200px;margin:1.5rem auto}

.pom-track{fill:none;stroke:var(--surface2);stroke-width:12}

.pom-mode-btn{padding:5px 14px;border-radius:100px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:"DM Sans",sans-serif;font-size:.73rem;cursor:pointer;transition:all .17s}

/* Progress tracking */
.prog-subject-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.3rem;margin-bottom:.8rem}

.streak-banner{background:linear-gradient(135deg,rgba(212,168,83,.2),rgba(212,168,83,.05));border:1px solid rgba(212,168,83,.3);border-radius:var(--r);padding:1rem 1.3rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem}
.streak-num{font-family:"DM Serif Display",serif;font-size:2.5rem;color:var(--accent);flex-shrink:0}

/* Session log */
.session-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:.9rem 1.1rem;margin-bottom:.6rem;display:flex;align-items:center;gap:1rem}

.session-info{flex:1}

.today-total{background:var(--surface2);border-radius:var(--r);padding:1rem 1.3rem;margin-bottom:1.5rem;display:flex;gap:1.5rem;flex-wrap:wrap}
.today-stat{flex:1;min-width:100px;text-align:center}
.today-stat-n{font-family:"DM Serif Display",serif;font-size:1.8rem;color:var(--text)}
.today-stat-l{font-size:.67rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}

/* Formula calc */
.formula-picker{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:1.5rem}
.formula-tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:.9rem 1rem;cursor:pointer;transition:all .18s;text-align:left;width:100%;font-family:"DM Sans",sans-serif;color:var(--text)}
.formula-tile:hover,.formula-tile.active{border-color:var(--accent);background:rgba(212,168,83,.07)}
.formula-tile .ft-eq{font-family:monospace;font-size:1rem;color:var(--accent);display:block;margin-bottom:.25rem}
.formula-tile .ft-nm{font-size:.72rem;color:var(--muted)}
.calc-inputs{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem 1.3rem;margin-bottom:1rem}
.calc-var-row{display:flex;align-items:center;gap:.8rem;margin-bottom:.8rem}
.calc-var-row:last-child{margin-bottom:0}
.calc-var-lbl{font-family:monospace;font-size:.95rem;color:var(--accent);width:60px;flex-shrink:0}
.calc-var-desc{font-size:.72rem;color:var(--muted);flex:1}
.calc-var-inp{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-family:"DM Sans",sans-serif;font-size:.9rem;padding:6px 10px;width:120px;outline:none;transition:border-color .17s}
.calc-var-inp:focus{border-color:var(--accent)}
.calc-var-inp:disabled{opacity:.4;cursor:not-allowed}
.calc-result{background:rgba(212,168,83,.1);border:1px solid rgba(212,168,83,.3);border-radius:var(--r);padding:1rem 1.3rem;text-align:center;margin-top:.5rem}

.calc-result-lbl{font-size:.75rem;color:var(--muted);margin-top:.2rem}
.calc-solve-btn-row{display:flex;gap:8px;margin-top:.8rem;flex-wrap:wrap}

/* Spaced repetition */
.sr-card-count{font-size:.78rem;color:var(--muted);margin-bottom:.6rem;text-align:center}
.sr-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem 1.5rem;text-align:center;min-height:160px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:1rem;transition:all .18s}
.sr-card:hover{border-color:var(--accent)}
.sr-card-front{font-size:1.1rem;color:var(--text);line-height:1.5}
.sr-card-back{font-size:.9rem;color:var(--muted);line-height:1.6;display:none}
.sr-card.flipped .sr-card-front{display:none}

.sr-rating-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.sr-btn{padding:8px 18px;border-radius:var(--r-sm);border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:"DM Sans",sans-serif;font-size:.82rem;cursor:pointer;transition:all .18s}
.sr-btn.again{border-color:#7c3a3a;color:#c06060}.sr-btn.hard{border-color:#7c6030;color:#c0a060}
.sr-btn.good{border-color:#3a7c5a;color:#60c090}.sr-btn.easy{border-color:var(--accent);color:var(--accent)}
.sr-btn:hover{opacity:.8}
.sr-subj-select{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.sr-queue-info{background:var(--surface2);border-radius:var(--r-sm);padding:.7rem 1rem;font-size:.78rem;color:var(--muted);margin-bottom:1rem;display:flex;gap:1.2rem;flex-wrap:wrap}

/* Essay outline builder */
.essay-type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:1.5rem}
.essay-type-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:1rem;cursor:pointer;transition:all .18s;text-align:left;width:100%;font-family:"DM Sans",sans-serif;color:var(--text)}
.essay-type-card:hover,.essay-type-card.active{border-color:var(--accent);background:rgba(212,168,83,.07)}
.essay-type-icon{font-size:1.3rem;margin-bottom:.4rem;display:block}
.essay-type-name{font-size:.85rem;font-weight:500;margin-bottom:.15rem}
.essay-type-desc{font-size:.7rem;color:var(--muted);line-height:1.4}
.essay-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.3rem;margin-bottom:.8rem}
.essay-section-title{font-size:.78rem;text-transform:uppercase;letter-spacing:.09em;color:var(--accent);font-weight:500;margin-bottom:.6rem;display:flex;justify-content:space-between;align-items:center}
.essay-textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-family:"DM Sans",sans-serif;font-size:.85rem;padding:9px 11px;outline:none;resize:vertical;min-height:70px;transition:border-color .17s;line-height:1.55}
.essay-textarea:focus{border-color:var(--accent)}

.essay-rubric-check input[type=checkbox]{accent-color:var(--accent);margin-top:1px;flex-shrink:0}
.essay-rubric-check.done{color:var(--correct)}
.essay-prompt-box{background:rgba(212,168,83,.07);border:1px solid rgba(212,168,83,.25);border-radius:var(--r);padding:1rem 1.2rem;margin-bottom:1.2rem;font-size:.85rem;color:var(--text);line-height:1.6}

/* Periodic table standalone */
.ptable-full-wrap{overflow-x:auto;padding-bottom:.5rem}
.ptable-full{display:grid;grid-template-columns:repeat(18,minmax(46px,1fr));gap:2px;min-width:860px}
.pt-cell{border-radius:4px;padding:4px 3px;font-size:.62rem;cursor:pointer;transition:all .15s;text-align:center;position:relative;border:1px solid transparent}
.pt-cell:hover{transform:scale(1.12);z-index:5;border-color:var(--accent)}
.pt-cell .pt-num{font-size:.55rem;color:var(--muted);line-height:1}

.pt-cell.empty{background:transparent;cursor:default;border-color:transparent}
.pt-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;font-size:.68rem}

.pt-detail-full{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem 1.4rem;margin-top:1rem}
.pt-trend-row{display:flex;gap:8px;margin-bottom:.8rem;flex-wrap:wrap}
.pt-trend-card{flex:1;min-width:140px;background:var(--surface2);border-radius:var(--r-sm);padding:.7rem .9rem;font-size:.75rem}
.pt-trend-name{font-weight:500;color:var(--text);margin-bottom:.3rem}
.pt-trend-desc{color:var(--muted);font-size:.7rem;line-height:1.4}

/* Notes */
.notes-toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.8rem;align-items:center}

.essay-timer-bar{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:.8rem 1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap}

.essay-timer-label{font-size:.67rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-top:1px}

.timer-ctrl-btn{padding:4px 11px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:"DM Sans",sans-serif;font-size:.73rem;cursor:pointer;transition:all .17s}
.timer-ctrl-btn:hover{border-color:var(--accent);color:var(--text)}

function showPage(id){
  document.querySelectorAll("#app-pages .page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll("#app-nav .nav-tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("page-"+id)?.classList.add("active");
  document.querySelectorAll("#app-nav .nav-tab").forEach(t=>{if(t.dataset.page===id)t.classList.add("active");});
  if(id==="ptable")renderPTable();
}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function loadClass(id){
  document.getElementById("home").style.display="none";
  const app=document.getElementById("app");
  app.style.display="flex";
  const histClasses=["apworld","apush"];
  const sciClasses=["phys","chem"];
  const spanishClasses=["sp1","sp2","sp3","sp4"];
  const mathClasses=["alg1","geo","alg2","precalc"];
  if(histClasses.includes(id)) loadHistClass(id);
  else if(sciClasses.includes(id)) loadSciClass(id);
  else if(spanishClasses.includes(id)) loadSpanishClass(id);
  else loadMathClass(id);
}

const AW_MCQ=[
{u:"1",q:"Which of the following best explains why Buddhism spread rapidly along the Silk Roads?",choices:["Merchants adopted and transmitted Buddhist beliefs as they traveled","Buddhist missionaries used military force","The Roman Empire actively promoted Buddhism","Buddhism spread through forced conversion"],ans:0,explain:"Buddhism spread through peaceful cultural diffusion — merchants carried beliefs along trade routes as they traded goods, a classic example of how commerce drives cultural exchange."},
{u:"1",q:"Confucianism emphasized all of the following EXCEPT:",choices:["Filial piety and respect for elders","Individual salvation and spiritual enlightenment","Hierarchical social relationships","Loyalty to the ruler and state"],ans:1,explain:"Individual salvation is central to Buddhism and Christianity, not Confucianism. Confucianism focused on social harmony, proper relationships, and good governance in this world, not the afterlife."},
{u:"1",q:"The development of classical empires like Han China and Rome was most directly enabled by:",choices:["Democratic political institutions","Bureaucracies, roads, and standardized legal systems","Rejection of previous religious traditions","Domination of sea trade routes"],ans:1,explain:"Classical empires maintained control over vast territories through administrative bureaucracies, road networks that moved armies and goods, and legal systems that standardized governance."},
{u:"1",q:"The Axial Age (800–200 BCE) is best characterized as a period when:",choices:["Major world religions and philosophies emerged independently across Eurasia","Military conquest unified Eurasia under one empire","Long-distance trade routes first developed","Writing systems spread from Mesopotamia worldwide"],ans:0,explain:"Scholars use 'Axial Age' to describe the remarkable simultaneous emergence of major philosophical and religious traditions — Buddhism, Confucianism, Greek philosophy, Zoroastrianism — in separate regions."},
{u:"1",q:"Which of the following most directly contributed to the fall of the Western Roman Empire?",choices:["Plague and disease","Military overextension, economic strain, and external invasions","Conflict with the Han Dynasty","Rejection of Christianity by the population"],ans:1,explain:"Rome's fall resulted from multiple converging factors: costly military campaigns, economic problems including inflation, political instability, and increasing pressure from Germanic peoples and the Huns."},
{u:"2",q:"The Pax Mongolica most directly contributed to which of the following?",choices:["Collapse of the Silk Road trade network","An increase in cross-cultural exchange and long-distance trade","Spread of democracy across Central Asia","Permanent unification of China and the Middle East"],ans:1,explain:"The Mongol peace created safe conditions for merchants and travelers to cross Eurasia, dramatically increasing the flow of goods, ideas, and diseases — including the Black Death."},
{u:"2",q:"Which of the following best describes the impact of the Black Death on Eurasian societies?",choices:["It had minimal impact because most people had developed immunity","Labor shortages gave surviving peasants greater bargaining power in Europe","It led to immediate unification of European kingdoms","The disease was confined to Central Asia and never reached Western Europe"],ans:1,explain:"The Black Death killed 30–60% of Europe's population. The resulting labor shortages gave surviving peasants and workers leverage to demand better wages and conditions, accelerating the decline of feudalism."},
{u:"2",q:"The primary purpose of Indian Ocean trade networks between 1000–1450 was:",choices:["Spreading Christianity to Southeast Asia","Exchanging luxury goods including spices, silk, and porcelain","Establishing direct political control over coastal regions","Sharing military technology across the Indian Ocean"],ans:1,explain:"Indian Ocean trade was driven by merchant demand for high-value goods — spices from Southeast Asia, silk and porcelain from China, cotton textiles from India. Merchants formed diasporic communities in port cities."},
{u:"2",q:"Which best explains why the Mongol Empire facilitated cultural exchange despite its violent conquest?",choices:["Mongols converted to Islam immediately after conquering Central Asia","The Pax Mongolica created stable conditions for merchants and diplomats to travel safely across Eurasia","Mongols built universities throughout their empire","Mongol leaders banned warfare after founding the empire"],ans:1,explain:"After conquest, Mongols maintained the Pax Mongolica — relative stability — across their vast territory. This allowed safe travel from China to Europe, enabling merchants like Marco Polo and diplomatic exchanges."},
{u:"2",q:"Mali's position as a major power in the 13th–14th centuries was primarily based on:",choices:["Maritime trade across the Atlantic","Control of trans-Saharan gold and salt trade routes","Military conquest of North Africa and Egypt","Alliance with the Mongol Empire"],ans:1,explain:"Mali's power rested on control of West African gold mines and the trans-Saharan trade. Gold from Mali was the primary source for Mediterranean economies. Mansa Musa's pilgrimage in 1324, during which he reportedly gave away so much gold he caused inflation in Cairo, demonstrated this wealth."},
{u:"3",q:"The Ottoman devshirme system is best understood as creating:",choices:["A loyal military and administrative class dependent solely on the sultan","Religious tolerance by integrating Christians into Ottoman society","A system to reduce the power of the Janissaries","A tax system to fund Ottoman expansion"],ans:0,explain:"By recruiting Christian boys, training them as Janissaries or administrators, and severing their family ties, the Ottomans created a corps loyal only to the sultan — not to local nobles or families who might challenge his power."},
{u:"3",q:"The Protestant Reformation most directly challenged:",choices:["The political authority of European monarchs","The Catholic Church's claim to religious authority and its corruption","The economic power of the merchant class","The influence of Islamic scholars in Europe"],ans:1,explain:"Luther and other reformers challenged specific Catholic practices — selling indulgences, clerical corruption — and the broader claim that the Church held exclusive authority to interpret scripture and grant salvation."},
{u:"3",q:"Which statement best compares the Ottoman and Mughal empires?",choices:["Both ruled exclusively Muslim populations","Both used gunpowder weapons and ruled diverse, multiethnic populations","The Mughal Empire expanded into Europe while the Ottomans focused on Asia","Both collapsed before 1600 due to European pressure"],ans:1,explain:"Both were 'gunpowder empires' that used firearms to conquer and rule. Both governed diverse populations — the Ottomans over Christians, Jews, and Muslims; the Mughals over a predominantly Hindu population with Muslim rulers."},
{u:"3",q:"Zheng He's voyages (1405–1433) are significant primarily because they:",choices:["Established permanent Chinese colonies in Africa and the Middle East","Demonstrated Chinese naval capacity and extended tributary relationships, but were not followed up","Led directly to Chinese domination of Indian Ocean trade","Opened direct trade between China and Europe"],ans:1,explain:"Zheng He's massive fleet demonstrated Chinese power and received tribute from many states, but after his death the voyages were abandoned due to Confucian opposition to maritime trade. China did not colonize or dominate Indian Ocean trade."},
{u:"4",q:"What most directly caused the development of the transatlantic slave trade?",choices:["Collapse of indigenous American populations due to disease, creating a labor shortage","European demand for spices requiring intensive labor","Refusal of indentured servants to work on plantations","Mongol disruption of overland trade routes"],ans:0,explain:"European diseases killed up to 90% of indigenous Americans within a century of contact. Colonizers turned to enslaved Africans to provide labor for profitable plantations growing sugar, tobacco, and other cash crops."},
{u:"4",q:"The Columbian Exchange most directly led to which long-term global change?",choices:["Decline of European population due to American diseases","Rapid global population growth as American crops spread to Afro-Eurasia","Immediate European domination of East Asian trade","Decline of the Ottoman Empire due to new diseases"],ans:1,explain:"American crops — potatoes, maize, sweet potatoes — could grow in poor soil and provided more calories per acre than Old World staples. Their spread across Afro-Eurasia enabled population growth, particularly in China and Europe."},
{u:"4",q:"Which best describes the encomienda system in Spanish colonies?",choices:["A system of free trade between Spanish colonies and indigenous peoples","A labor system granting colonizers rights to indigenous labor in exchange for religious instruction","A land redistribution system that gave land to indigenous farmers","A democratic system of local governance in Spanish America"],ans:1,explain:"The encomienda granted Spanish colonizers (encomenderos) the right to demand labor and tribute from indigenous people in a specific area, supposedly in exchange for protection and Catholic instruction. In practice it often resembled forced labor and contributed to indigenous population decline."},
{u:"4",q:"Which of the following best describes the role of joint-stock companies in European expansion?",choices:["They were government agencies that directly administered colonies","They spread risk among investors, enabling expensive long-distance trade voyages","They were primarily religious organizations spreading Christianity","They replaced monarchies as the primary political authorities in Europe"],ans:1,explain:"Joint-stock companies like the British East India Company and Dutch VOC allowed investors to pool capital for risky overseas ventures, spreading potential losses. This financial innovation was crucial to sustained European expansion."},
{u:"5",q:"The ideas of the Enlightenment most directly challenged which of the following?",choices:["The authority of monarchs and churches claiming power from divine right","The economic dominance of merchant classes","The spread of scientific knowledge","The military power of European states"],ans:0,explain:"Enlightenment thinkers like Locke, Voltaire, and Rousseau argued political authority derived from consent of the governed — directly threatening absolute monarchs and churches that claimed divine sanction for their power."},
{u:"5",q:"The Haitian Revolution (1791–1804) is historically significant primarily because:",choices:["It was the first successful revolution inspired by Enlightenment ideas in the Americas","It was the first successful revolution led by enslaved people, establishing the first Black republic","It led immediately to the abolition of slavery throughout the Americas","It demonstrated that European powers could easily suppress colonial revolts"],ans:1,explain:"The Haitian Revolution was unique: the only successful large-scale slave revolt in history. It established Haiti as the first independent Black republic, profoundly frightening slaveholders throughout the Americas and inspiring later movements."},
{u:"5",q:"Which best explains why industrialization began in Britain rather than elsewhere?",choices:["Britain had the largest population in Europe providing abundant labor","A combination of coal deposits, capital, colonial markets, and Protestant work ethic","The British government directly controlled and funded industrial development","Britain had no agricultural sector, forcing workers into manufacturing"],ans:1,explain:"Britain's industrialization resulted from multiple advantages: coal and iron deposits, capital accumulated from trade, colonial markets for manufactured goods, agricultural enclosure that pushed workers to cities, and a legal/banking system that protected investment."},
{u:"5",q:"The Congress of Vienna (1815) was primarily designed to:",choices:["Spread democratic revolutions across Europe","Restore the balance of power and conservative order after Napoleon","Create a unified European state","Abolish the slave trade globally"],ans:1,explain:"The Congress aimed to restore conservative monarchies after the disruptions of the French Revolution and Napoleon, suppress revolutionary movements, and create a 'balance of power' preventing any single nation from dominating Europe again."},
{u:"6",q:"European powers justified imperialism primarily through:",choices:["Economic arguments about poverty prevention","Social Darwinism and the 'civilizing mission'","Mandates from the Catholic Church","Military necessity to prevent rival non-European powers"],ans:1,explain:"Social Darwinism applied evolutionary theory to races, claiming some were naturally 'fitter.' Combined with the 'White Man's Burden' ideology of a civilizing mission, this provided pseudo-scientific and moral justification for colonization."},
{u:"6",q:"The Meiji Restoration in Japan (1868) demonstrated that:",choices:["Western industrialization could only succeed in European societies","A non-Western nation could rapidly modernize by selectively adopting Western technology and institutions","Japan required European assistance to industrialize","Traditional Japanese culture was incompatible with modernization"],ans:1,explain:"Meiji Japan deliberately modernized its military, government, education, and economy using Western models while maintaining Japanese cultural identity. Within a generation Japan became an industrial power capable of defeating Russia (1905)."},
{u:"6",q:"Which of the following best describes the economic relationship between European colonies and their colonizers?",choices:["Colonies were allowed to develop independent industrial economies","Colonies were primarily sources of raw materials that fed European industries","Colonizers invested equally in developing colonial infrastructure","Trade between colonies was more valuable than trade with Europe"],ans:1,explain:"Colonial economies were structured to serve European needs: providing raw materials (cotton, rubber, minerals) and serving as markets for European manufactured goods. Colonial policies often prevented industrialization in colonized regions."},
{u:"7",q:"WWI escalated from a regional conflict primarily because:",choices:["Franz Ferdinand's assassination caused all nations to declare war simultaneously","A complex alliance system meant Austria-Hungary vs Serbia pulled in major powers","Germany's invasion of France triggered automatic declarations","The US entered the war in 1914 causing wider conflict"],ans:1,explain:"The alliance system: Austria-Hungary declared war on Serbia, Russia mobilized to defend Serbia, Germany declared war on Russia and France, Britain declared war on Germany when it violated Belgian neutrality. A regional dispute triggered a continental war."},
{u:"7",q:"Which best explains the appeal of fascism in interwar Europe?",choices:["Fascism promised democratic reform and individual freedoms","Economic depression, fear of communism, and nationalist resentment made authoritarian nationalism attractive","Fascist leaders were elected in free and fair democratic elections with majority support","Fascism had strong religious backing from Catholic and Protestant churches"],ans:1,explain:"Economic devastation of the Great Depression, fear of communist revolution among the middle class, resentment over WWI peace terms (especially in Germany), and ultra-nationalist appeals made fascist movements attractive to many Europeans in the 1920s–30s."},
{u:"7",q:"The Holocaust is historically significant in world history primarily because:",choices:["It was the first instance of ethnic violence in human history","It demonstrated the industrial application of state power to systematic genocide, raising questions about modernity and human rights","It was caused solely by one individual — Adolf Hitler","It had no lasting impact on international law"],ans:1,explain:"The Holocaust demonstrated how modern bureaucracy, technology, and nationalism could be weaponized for systematic genocide. Its legacy directly shaped the UN Declaration of Human Rights (1948) and the Genocide Convention, transforming international norms."},
{u:"8",q:"The policy of containment was primarily designed to:",choices:["Physically contain the Soviet Union with a military wall","Prevent further spread of communism through economic aid and alliances","Reduce nuclear weapons through arms control treaties","Prevent Germany from rearming after WWII"],ans:1,explain:"Containment held that the US should prevent communism from spreading to new countries — through the Marshall Plan (economic aid to Western Europe), NATO (military alliance), and interventions in Korea and Vietnam."},
{u:"8",q:"Which best explains why decolonization accelerated after World War II?",choices:["European powers voluntarily gave up colonies because they were no longer profitable","WWII weakened European powers, strengthened nationalist movements, and created new international norms against colonialism","The United States forced European nations to grant independence to colonies","Colonies gained independence solely through violent revolution"],ans:1,explain:"WWII drained European powers economically, weakened their military prestige, and empowered nationalist movements. The UN Charter's self-determination principle and Cold War rivalry (both superpowers supported decolonization for different reasons) accelerated independence movements."},
{u:"8",q:"The Non-Aligned Movement during the Cold War sought to:",choices:["Create a military alliance against both the US and USSR","Maintain independence from both the US and Soviet blocs while pursuing development goals","Promote nuclear weapons development among newly independent nations","Establish a third economic system between capitalism and communism"],ans:1,explain:"Leaders like Nehru, Nkrumah, and Tito formed the Non-Aligned Movement to avoid being forced to choose sides in the Cold War, preserve sovereignty, and focus on economic development without becoming pawns of either superpower."},
{u:"9",q:"The concept of neocolonialism refers to:",choices:["Direct military occupation of former colonies","Use of economic dominance and political influence to control formally independent nations","A new wave of European colonization beginning in the 1970s","Cultural influence of Western nations through media alone"],ans:1,explain:"Scholars like Kwame Nkrumah argued formal independence didn't end colonial exploitation — wealthy nations and corporations used economic dependency, debt, trade terms, and political pressure to maintain effective control."},
{u:"9",q:"Which of the following best describes the impact of globalization since 1990?",choices:["It has created equal economic benefits for all nations","It has accelerated economic growth while increasing inequality both within and between nations","It has led to the decline of all national cultures","It has been entirely driven by Western European nations"],ans:1,explain:"Globalization has created enormous wealth through trade and investment, but benefits have been uneven — China and some Asian economies grew rapidly while others fell further behind. Within wealthy nations, manufacturing job losses increased inequality."},
{u:"9",q:"Climate change is historically significant in the context of world history primarily because:",choices:["It is a natural cycle unrelated to human activity","It represents the first time human activity has had global environmental consequences at a civilizational scale","It affects only developed industrial nations","Its effects are too far in the future to study historically"],ans:1,explain:"While humans have always altered local environments, industrial-era climate change represents a new scale — human economic activity is altering the global climate with potential consequences for civilizations worldwide. This connects to AP World's theme of human-environment interaction."}
]

const APUSH_MCQ=[
{u:"1",q:"Which of the following best describes the primary motivation for English colonization of North America in the early 1600s?",choices:["Spreading Protestantism to indigenous peoples","Economic profit through joint-stock companies seeking trade and resources","Escaping persecution from the Catholic Church in England","Building a military base against Spanish expansion"],ans:1,explain:"While religious motives played a role (especially for Puritans), English colonization was primarily driven by economic motives — joint-stock companies like the Virginia Company sought profitable resources and trade."},
{u:"1",q:"The Columbian Exchange most significantly affected Native American populations by:",choices:["Introducing new agricultural techniques that increased food production","Bringing European diseases against which they had no immunity, causing massive population decline","Creating new trade relationships that enriched Native societies","Providing access to iron tools that strengthened Native resistance"],ans:1,explain:"European diseases — smallpox, measles, influenza — killed up to 90% of the indigenous population in some regions within a century of contact. This demographic catastrophe fundamentally transformed the Americas."},
{u:"1",q:"Which of the following best describes the headright system in colonial Virginia?",choices:["A system granting religious freedom to new settlers","A land grant system that gave 50 acres for each person whose passage a colonist paid for","A system requiring colonists to work for the Virginia Company for seven years","A trade agreement with the Powhatan Confederacy"],ans:1,explain:"The headright system incentivized bringing laborers to Virginia by granting 50 acres per person transported. This system ultimately encouraged the growth of indentured servitude and later chattel slavery as planters sought labor for tobacco plantations."},
{u:"2",q:"The Navigation Acts (1651–1696) most directly served to:",choices:["Protect colonial merchants from Native American raids","Ensure that colonial trade benefited England by requiring colonies to trade primarily with England","Grant colonists greater political independence from Parliament","Regulate the slave trade across the Atlantic"],ans:1,explain:"The Navigation Acts required colonial goods to be shipped on English ships to English ports, keeping the economic benefits of colonial trade within the British Empire — a mercantilist policy that increasingly frustrated colonial merchants."},
{u:"2",q:"Bacon's Rebellion (1676) is significant primarily because it:",choices:["Successfully overthrew the Virginia colonial government permanently","Revealed class tensions between frontier settlers and the planter elite, leading planters to shift toward enslaved African labor","Led to a permanent alliance between poor whites and enslaved Africans","Resulted in the immediate abolition of indentured servitude"],ans:1,explain:"Bacon's Rebellion demonstrated the danger of an armed, discontented class of former indentured servants. Virginia planters' response was to shift toward enslaved African labor, which they believed would be more controllable than a growing class of freed white laborers."},
{u:"2",q:"The Great Awakening of the 1730s–1740s contributed to the American Revolution primarily by:",choices:["Convincing colonists to reject religion altogether","Challenging traditional hierarchical authority and encouraging individual judgment, habits of thought that carried into politics","Unifying all Protestant denominations under one church","Spreading the ideas of Enlightenment philosophers directly"],ans:1,explain:"The Great Awakening encouraged ordinary people to question established religious authority and make independent judgments about faith. This democratizing impulse — challenging hierarchy and tradition — contributed to the political culture that questioned British authority."},
{u:"3",q:"The Declaration of Independence drew most heavily on the political philosophy of:",choices:["John Calvin's ideas about predestination and divine right","John Locke's concept of natural rights, consent of the governed, and right of revolution","Thomas Hobbes' argument for absolute sovereignty","Montesquieu's model of separation of powers"],ans:1,explain:"Jefferson drew heavily on Locke's Second Treatise — natural rights to life, liberty, and property (Jefferson changed to 'pursuit of happiness'), government deriving authority from consent of the governed, and the right to revolt when government violates natural rights."},
{u:"3",q:"The Articles of Confederation's most significant weakness was:",choices:["It gave the national government too much power over the states","Congress could not levy taxes or regulate commerce, leaving the government unable to fund itself","It failed to establish any system of courts","It gave the president unlimited executive power"],ans:1,explain:"Under the Articles, Congress could not tax citizens directly, only requisition money from states (which often refused). It also couldn't regulate commerce between states, leading to economic chaos — a primary motivation for the Constitutional Convention."},
{u:"3",q:"The Three-Fifths Compromise addressed which controversy at the Constitutional Convention?",choices:["Whether enslaved people could vote in federal elections","How enslaved people would be counted for purposes of taxation and congressional representation","Whether the international slave trade should continue","How to balance large and small state representation in Congress"],ans:1,explain:"The Three-Fifths Compromise counted enslaved people as 3/5 of a person for both congressional representation and direct taxes — benefiting Southern states by increasing their political representation without granting rights to enslaved people."},
{u:"4",q:"Hamilton's financial program was controversial primarily because:",choices:["It proposed abolishing slavery immediately","It favored manufacturing and financial interests over agrarian ones, raising constitutional questions about federal power","It rejected the creation of a national bank","It proposed directly taxing the wealthy"],ans:1,explain:"Hamilton's program — assumption of state debts, national bank, protective tariffs — favored Northern merchants and manufacturers, raised the national debt, and required a broad interpretation of federal power that Jefferson and others opposed as unconstitutional."},
{u:"4",q:"The Louisiana Purchase (1803) was controversial constitutionally because:",choices:["It violated a treaty with France","The Constitution did not explicitly grant the president power to purchase foreign territory","It was opposed by the Supreme Court","Congress refused to appropriate funds for the purchase"],ans:1,explain:"Jefferson, a strict constructionist who believed the federal government could only do what the Constitution explicitly permitted, acknowledged the Constitution gave no explicit authority to acquire territory. He ultimately justified it as a treaty power and accepted the hypocrisy given the strategic importance."},
{u:"4",q:"The Missouri Compromise (1820) addressed the issue of slavery expansion by:",choices:["Abolishing slavery in all new territories","Admitting Missouri as a slave state and Maine as a free state, drawing a line at 36°30' for future territories","Allowing each territory to decide the issue of slavery by popular vote","Requiring all new states to be admitted as free states"],ans:1,explain:"The Missouri Compromise maintained the Senate balance between slave and free states by admitting Missouri (slave) and Maine (free) simultaneously, and prohibited slavery in Louisiana Territory north of the 36°30' parallel — a compromise that held for 30 years."},
{u:"5",q:"The Second Great Awakening contributed to antebellum reform movements primarily by:",choices:["Encouraging acceptance of social inequality as God's will","Promoting the idea that individuals and society could be perfected, inspiring abolition, temperance, and women's rights movements","Discouraging political activism among church members","Strengthening support for slavery in the South"],ans:1,explain:"The Second Great Awakening's emphasis on free will, moral improvement, and the possibility of personal and social perfection inspired reform movements — if individuals could achieve salvation through their choices, then social evils like slavery could also be eliminated."},
{u:"5",q:"The concept of 'Manifest Destiny' was used to justify:",choices:["American neutrality in European conflicts","Westward territorial expansion as divinely ordained and inevitable","The annexation of Canada from Britain","American trade with Asia"],ans:1,explain:"Manifest Destiny — the belief that American expansion across the continent was God-given, inevitable, and beneficial — justified displacing Native peoples, the Mexican-American War, and acquisition of new territories. It combined nationalism, racism, and religious belief."},
{u:"5",q:"The Kansas-Nebraska Act (1854) was significant primarily because it:",choices:["Permanently resolved the slavery expansion debate","Repealed the Missouri Compromise and introduced popular sovereignty, intensifying sectional conflict and leading to violent conflict in Kansas","Admitted both Kansas and Nebraska as free states","Led directly to the Civil War by making slavery illegal in all territories"],ans:1,explain:"The Act replaced the Missouri Compromise line with popular sovereignty, opening previously closed territories to potential slavery. The resulting violence in 'Bleeding Kansas' and the destruction of the second party system accelerated the path to Civil War."},
{u:"6",q:"The Reconstruction Amendments (13th, 14th, 15th) were primarily significant because they:",choices:["Were immediately and fully enforced throughout the South","Constitutionally abolished slavery, defined national citizenship, and guaranteed voting rights regardless of race — though enforcement failed","Gave formerly enslaved people land and economic independence","Were quickly repealed after Reconstruction ended"],ans:1,explain:"The Reconstruction Amendments transformed the Constitution by abolishing slavery, making Black Americans citizens with equal protection, and prohibiting race-based voting discrimination. However, the Supreme Court and Southern states undermined their enforcement, and full realization awaited the Civil Rights Movement."},
{u:"6",q:"The rise of industrial capitalism in the Gilded Age most directly led to:",choices:["Equal distribution of wealth across the United States","Immense concentration of wealth among industrialists alongside dangerous working conditions and labor unrest","Decline of immigration as workers found prosperity","Immediate government regulation of corporations"],ans:1,explain:"Industrialization created enormous wealth for 'robber barons' like Carnegie and Rockefeller while workers endured dangerous conditions, long hours, and low wages. This inequality fueled labor movements, the Populist Party, and eventually Progressive Era reform."},
{u:"6",q:"Which of the following best explains why the US pursued overseas expansion in the 1890s?",choices:["The US sought to spread democracy to undeveloped nations","A combination of economic markets, Social Darwinism, naval strategy, and a perceived 'closing' of the western frontier","The US was responding to direct military threats from European powers","The Spanish-American War forced the US to take overseas territories it didn't want"],ans:1,explain:"Multiple factors drove 1890s imperialism: industrialists sought new markets, Alfred Mahan argued for naval power requiring bases, Social Darwinism promoted Anglo-Saxon superiority, and Frederick Jackson Turner's frontier thesis suggested the domestic frontier was closed."},
{u:"7",q:"The Progressive Era reforms of the early 1900s were primarily a response to:",choices:["Foreign military threats requiring domestic mobilization","The social problems created by rapid industrialization and urbanization, including corruption, dangerous conditions, and inequality","Demands from wealthy industrialists for stable government","Religious revival movements calling for moral reform"],ans:1,explain:"Progressive reformers — muckraker journalists, settlement house workers, politicians — responded to the urban poverty, corporate corruption, political machines, dangerous working conditions, and social inequality produced by rapid industrial urbanization."},
{u:"7",q:"Which of the following best describes the significance of the New Deal?",choices:["It permanently solved the Great Depression by restoring full employment","It significantly expanded federal government's role in the economy and established the foundation of the welfare state","It was declared entirely unconstitutional by the Supreme Court","It was primarily a military program to prepare for World War II"],ans:1,explain:"While the New Deal didn't end the Depression (WWII did), it created lasting institutions: Social Security, FDIC, SEC, labor rights laws. It fundamentally shifted Americans' expectations of federal government responsibility for economic welfare."},
{u:"7",q:"American involvement in World War I was most directly triggered by:",choices:["The assassination of Archduke Franz Ferdinand","Germany's unrestricted submarine warfare and the Zimmermann Telegram","Britain's blockade of American shipping","The sinking of the Lusitania in 1914"],ans:1,explain:"Wilson's 1917 war message cited German unrestricted submarine warfare (resuming in February 1917, directly threatening American ships and lives) and the Zimmermann Telegram (Germany proposing Mexico attack the US) as immediate causes, though economic ties to Britain were also significant."},
{u:"8",q:"The policy of containment was most significantly tested during the Korean War because:",choices:["For the first time the US fought directly against Soviet forces","It demonstrated that the US would use military force to prevent communist expansion, even in limited, non-nuclear conflicts outside Europe","The US used nuclear weapons to stop North Korean aggression","Congress officially declared war, setting a precedent for future conflicts"],ans:1,explain:"Korea proved the US would commit troops to contain communism beyond Europe and outside formal war declarations. The 'limited war' concept — not using nuclear weapons, not pursuing total victory — was controversial and set precedents for Vietnam."},
{u:"8",q:"The Civil Rights Movement's most effective strategy was:",choices:["Armed resistance against segregationist violence","Nonviolent direct action that exposed the moral bankruptcy of segregation, combined with legal challenges and legislative lobbying","Working exclusively through federal courts","Seeking international asylum for Black Americans"],ans:1,explain:"King's philosophy combined nonviolent direct action (sit-ins, marches) that provoked violent responses visible on TV, legal challenges through the NAACP, and political pressure. This combination created the moral and political pressure leading to the Civil Rights Act (1964) and Voting Rights Act (1965)."},
{u:"8",q:"The Immigration and Nationality Act of 1965 was significant because it:",choices:["Reduced total immigration to the United States","Abolished national-origin quotas, dramatically changing the source countries of immigration and transforming American demographics","Was passed solely to allow European refugees into the United States","Required all immigrants to speak English"],ans:1,explain:"The 1965 Act replaced the 1924 quota system (which heavily favored Northern Europeans) with a preference system based on family reunification and skills. This dramatically shifted immigration sources toward Latin America, Asia, and Africa, fundamentally changing American demographics."},
{u:"9",q:"The Reagan Revolution most directly represented a shift toward:",choices:["Greater federal government spending on social programs","Market-oriented economic policies including tax cuts, deregulation, and reduced social spending","Increased environmental regulation","Greater American involvement in international institutions"],ans:1,explain:"Reagan's program — cutting income taxes (especially for the wealthy), deregulating industries, reducing social spending, attacking union power — represented a fundamental shift from the New Deal/Great Society liberal consensus, with lasting effects on American economic policy."},
{u:"9",q:"Which best describes the economic impact of deindustrialization in the late 20th century United States?",choices:["It created new jobs in manufacturing that replaced older ones","Manufacturing jobs moved to cheaper-labor regions abroad and domestically, devastating former industrial centers and increasing economic inequality","All Americans benefited equally from the transition to a service economy","The government prevented most factory closures through regulation"],ans:1,explain:"Deindustrialization gutted the 'Rust Belt' — once-thriving industrial cities lost hundreds of thousands of manufacturing jobs as factories moved South or overseas. This devastated working-class communities, increased inequality, and reshaped American politics."},

const PHYS_VOCAB=[
{u:"1",t:"Kinematics",d:"The study of motion without considering its causes. Describes position, velocity, acceleration, and time."},
{u:"1",t:"Position (x)",d:"Where an object is located, measured from a reference point. Can be positive or negative depending on direction."},
{u:"1",t:"Distance",d:"Total path length traveled — always positive, a scalar quantity. Does NOT care about direction."},
{u:"1",t:"Displacement (Δx)",d:"Straight-line change in position from start to end, including direction. Can be positive, negative, or zero."},
{u:"1",t:"Speed",d:"Distance ÷ time. How fast something moves — scalar, no direction. Speed = d/t."},
{u:"1",t:"Velocity (v)",d:"Displacement ÷ time — speed WITH direction. Vector quantity. Average v = Δx/Δt."},
{u:"1",t:"Acceleration (a)",d:"Rate of change of velocity. a = Δv/Δt. Can mean speeding up, slowing down (deceleration), or changing direction."},
{u:"1",t:"Uniform acceleration",d:"Constant acceleration — the rate of change of velocity is steady. Free fall is the classic example (a = g = 9.8 m/s²)."},
{u:"1",t:"Free fall",d:"Motion under gravity alone — no air resistance. All objects accelerate downward at g ≈ 9.8 m/s² regardless of mass."},
{u:"1",t:"Projectile",d:"An object launched into the air that moves under gravity only. Horizontal motion is constant; vertical is free fall — they are independent."},
{u:"1",t:"Scalar",d:"A quantity with magnitude (size) only — no direction. Examples: speed, distance, mass, temperature, energy, time."},
{u:"1",t:"Vector",d:"A quantity with both magnitude AND direction. Examples: velocity, displacement, force, acceleration, momentum, weight."},
{u:"2",t:"Force (F)",d:"A push or pull that can change an object's motion. Measured in Newtons (N). 1 N = 1 kg·m/s²."},
{u:"2",t:"Net force (Fₙₑₜ)",d:"The vector sum of all forces on an object. Net force causes acceleration. Zero net force = equilibrium (no acceleration)."},
{u:"2",t:"Newton's 1st Law (Inertia)",d:"An object at rest stays at rest, and an object in motion stays in uniform motion, unless acted on by a net external force."},
{u:"2",t:"Newton's 2nd Law",d:"Fₙₑₜ = ma. Net force equals mass times acceleration. The core equation of dynamics."},
{u:"2",t:"Newton's 3rd Law",d:"For every action force, there is an equal and opposite reaction force. The two forces act on DIFFERENT objects."},
{u:"2",t:"Mass (m)",d:"A measure of inertia — resistance to acceleration. Measured in kilograms (kg). NOT the same as weight."},
{u:"2",t:"Weight (W)",d:"The gravitational force on an object. W = mg. Measured in Newtons — it changes on different planets. Mass does not."},
{u:"2",t:"Normal force (N)",d:"The perpendicular support force from a surface. On flat ground: N = mg. On an incline it decreases."},
{u:"2",t:"Friction (f)",d:"A force opposing relative motion between surfaces in contact. f = μN. Static friction is greater than kinetic friction."},
{u:"2",t:"Tension (T)",d:"Pulling force transmitted through a rope, cable, or string. Acts along the direction of the rope."},
{u:"2",t:"Equilibrium",d:"The state when net force = 0. The object is either at rest (static) or moving at constant velocity (dynamic)."},
{u:"3",t:"Work (W)",d:"W = Fd·cosθ. Energy transferred when a force moves an object. Only the component of force parallel to motion counts. Joules."},
{u:"3",t:"Kinetic energy (KE)",d:"Energy an object has due to motion. KE = ½mv². Doubles when speed increases by √2; quadruples when speed doubles."},
{u:"3",t:"Gravitational potential energy (PE)",d:"Stored energy due to height above a reference point. PE = mgh. Increases with height, mass, or stronger gravity."},
{u:"3",t:"Mechanical energy",d:"Total of kinetic and potential energy: ME = KE + PE. Conserved when no non-conservative forces (like friction) act."},
{u:"3",t:"Conservation of energy",d:"Energy cannot be created or destroyed — only converted between forms. Total energy of a closed system is constant."},
{u:"3",t:"Power (P)",d:"The rate of doing work. P = W/t = Fv. Measured in Watts (W). 1 Watt = 1 Joule per second."},
{u:"3",t:"Momentum (p)",d:"p = mv. Mass × velocity. A vector. Conserved in all collisions (law of conservation of momentum)."},
{u:"3",t:"Impulse (J)",d:"J = FΔt = Δp. The change in momentum. A large force for a short time equals a small force for a long time."},
{u:"3",t:"Law of conservation of momentum",d:"Total momentum of an isolated system is constant — not created or destroyed. Used to analyze collisions and explosions."},
{u:"4",t:"Wave",d:"A disturbance that transfers energy through a medium (or space) without transferring matter itself."},
{u:"4",t:"Transverse wave",d:"Particles vibrate perpendicular to the direction of wave travel. Examples: light, guitar string, water surface."},
{u:"4",t:"Longitudinal wave",d:"Particles vibrate parallel to the direction of wave travel. Example: sound waves — compressions and rarefactions."},
{u:"4",t:"Wavelength (λ)",d:"Distance between two consecutive identical points on a wave (crest to crest, or trough to trough). Measured in meters."},
{u:"4",t:"Frequency (f)",d:"Number of complete wave cycles per second. Measured in Hertz (Hz). 1 Hz = 1 cycle/second."},
{u:"4",t:"Period (T)",d:"Time for one complete cycle. T = 1/f. If f = 50 Hz, then T = 0.02 s."},
{u:"4",t:"Amplitude",d:"Maximum displacement from the equilibrium position. Determines the energy/intensity of the wave. Loudness in sound; brightness in light."},
{u:"4",t:"Wave speed",d:"How fast the wave pattern moves through the medium. v = fλ. Sound ≈ 340 m/s in air; light = 3×10⁸ m/s in vacuum."},
{u:"4",t:"Electromagnetic spectrum",d:"The full range of EM radiation ordered by frequency/wavelength: Radio → Microwave → Infrared → Visible → UV → X-ray → Gamma."},
{u:"4",t:"Reflection",d:"Wave bounces back when hitting a boundary. Angle of incidence = angle of reflection."},
{u:"4",t:"Refraction",d:"Wave bends when it passes from one medium to another because its speed changes. Causes light to bend in water/glass."},
{u:"4",t:"Doppler effect",d:"Observed frequency changes when source and observer move relative to each other. Moving toward = higher frequency (pitch)."},
{u:"5",t:"Electric charge",d:"A fundamental property of matter — positive (protons) or negative (electrons). Like charges repel; opposite charges attract."},
{u:"5",t:"Electric current (I)",d:"Flow of electric charge through a conductor. I = Q/t. Measured in Amperes (A). Conventional current flows + to −."},
{u:"5",t:"Voltage (V)",d:"Electric potential difference — the 'pressure' driving current. Measured in Volts (V). Like water pressure in a pipe."},
{u:"5",t:"Resistance (R)",d:"Opposition to current flow. Measured in Ohms (Ω). Depends on material, length, cross-section, and temperature."},
{u:"5",t:"Ohm's Law",d:"V = IR. Voltage = Current × Resistance. The fundamental relationship in circuit analysis."},
{u:"5",t:"Electric power",d:"P = IV = I²R = V²/R. Rate of energy use. Measured in Watts. A 60W bulb uses 60 J of energy every second."},
{u:"5",t:"Series circuit",d:"Components in one loop. Same current through all. Voltages add. Total R = sum of individual R. One break stops all."},
{u:"5",t:"Parallel circuit",d:"Components in side-by-side branches. Same voltage across each. Currents add. Total R less than smallest branch R."},
{u:"5",t:"Electromagnetic induction",d:"A changing magnetic field creates an electric current in a conductor. This is how generators and transformers work."}
];
